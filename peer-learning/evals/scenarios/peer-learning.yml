scenarios:
  # Curation is the product — cap at 3, defer the rest (never silently drop).
  - name: curation_caps_at_three_and_defers
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context — gh unavailable; merged-PR candidates provided inline. No prior history.)
      Five genuinely learnings-rich merged PRs this window:
      1. zenpayroll #350001 (USPDS-701) — extract a shared `Retryable.with_backoff` wrapper used by 3 callers.
      2. zenpayroll #350002 (USPDS-702) — expand→migrate→contract column rollout for a denormalized hash.
      3. web #22001 (USPDS-703) — move filtered list state to server-owned, refetch on mutation.
      4. zenpayroll #350003 (USPDS-704) — basename an attacker-controlled filename before File.join.
      5. zenpayroll #350004 (USPDS-705) — config-as-data modulo trigger for recurring quarterly windows.
    evaluations:
      - type: behavior
        expectations:
          - "Features at most 3 patterns as the curated set"
          - "Explicitly notes/defers the candidates it did NOT feature (e.g. a 'N source PRs' stat or an acknowledgment) rather than silently dropping them"
          - "The featured picks are the learnings-rich ones, framed as reusable patterns"
        auto_fail:
          - "Features more than 3 full patterns"
          - "Silently omits the un-featured candidates with no acknowledgment of the cut"

  # Drop the noise — dependency bumps / formatting are not patterns.
  - name: drops_noise_prs
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context.) Candidates:
      - zenpayroll #350010 (USPDS-710) — bump rails 7.1.3 → 7.1.4 (Gemfile.lock only).
      - zenpayroll #350011 — rubocop autocorrect, formatting only, no logic change.
      - zenpayroll #350012 (USPDS-712) — introduce an idempotency guard keyed on a request UUID (real pattern).
    evaluations:
      - type: behavior
        expectations:
          - "Features the idempotency-guard PR as a pattern"
          - "Does NOT feature the dependency bump or the formatting-only PR"
        auto_fail:
          - "Features the Gemfile.lock bump or the rubocop-autocorrect PR as a learning pattern"

  # ★ New = tag only, no blurb (self-evident first appearance).
  - name: flag_new_no_blurb
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context.) team-patterns.md is EMPTY (no prior issues, no history). One featured pattern:
      zenpayroll #350020 (USPDS-720) — a circuit-breaker around an external pricing call.
    evaluations:
      - type: behavior
        expectations:
          - "Flags the pattern as ★ New"
          - "Gives New NO explanatory blurb — just the tag (it's a first appearance)"
        auto_fail:
          - "Attaches a justifying blurb/paragraph to the New flag"
          - "Marks it Recurring or Encore despite empty history"

  # ↺ Recurring = team-frequency, tag + ONE short trend line.
  - name: flag_recurring_with_short_blurb
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context.) team-patterns.md already contains, from TWO prior sprints:
        ### Fail fast vs degrade
        - key: resilience:fail-fast-vs-degrade
        - times-seen: 2
      A current candidate matches that key (another raise-on-misconfig / degrade-on-absence split).
    evaluations:
      - type: behavior
        expectations:
          - "Flags it ↺ Recurring (NOT New), recognizing the matching key in history"
          - "Adds ONE short trend/count line (e.g. '3rd sprint') — not a paragraph"
        auto_fail:
          - "Marks it ★ New despite the matching key in history"
          - "Writes a multi-sentence blurb instead of a single short line"

  # Encore = Monica's personal exposure, distinct from team-frequency.
  - name: flag_encore_personal_exposure
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context.) No team-frequency history for this key, BUT Monica's
      ~/workspace/notes/reviews_practice/2026-06-15-pr347615.md shows she practiced reviewing the
      isolated-signing-key pattern (key security:isolated-signing-key). A current candidate matches it.
    evaluations:
      - type: behavior
        expectations:
          - "Flags it Encore (Monica has personal prior exposure via her practice log)"
          - "Adds a short personal-link line (e.g. 'you reviewed this in PR #347615, Jun 15')"
        auto_fail:
          - "Treats it as ★ New, ignoring her personal exposure"
          - "Conflates Encore with team-Recurring (there is no team-frequency history here)"

  # One pattern per card — a second distinct pattern is its own card, not a crammed aside.
  - name: one_pattern_per_card_no_bonus_aside
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context.) A single merged PR (zenpayroll #350030, USPDS-730) contains TWO distinct,
      independently-reusable patterns: (a) a dedicated signing key isolated from the org JWKS, and
      (b) a fail-fast-vs-degrade config split. No prior history.
    evaluations:
      - type: behavior
        expectations:
          - "Treats the two distinct patterns as separate cards, OR features the stronger one — does NOT cram the second into a 'bonus pattern' aside"
        auto_fail:
          - "Crams the second distinct pattern into a 'bonus pattern' aside inside one card"

  # Substrate write must be well-formed.
  - name: substrate_entry_wellformed
    prompt: |
      /peer-learning --since 2026-06-16

      (Mock context.) One featured pattern: web #22050 (USPDS-740) — delete the client-side shadow
      copy of filtered state; server owns it, refetch on mutation success.
    evaluations:
      - type: behavior
        expectations:
          - "Produces a team-patterns.md entry for the featured pattern"
          - "The entry carries all required fields: a normalized key (category:slug), category, what, why, seen-in (repo PR# + ticket), first-seen, times-seen"
        auto_fail:
          - "Omits the substrate entry entirely"
          - "Writes a malformed entry missing the key or the seen-in PR/ticket attribution"

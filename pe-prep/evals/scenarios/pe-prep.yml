scenarios:
  # The defining rule — the 1:1 is not a technical sync. Altitude filtering is why the skill exists.
  - name: altitude_not_technical
    prompt: |
      /pe-prep

      (Mock — last 1:1 note prudhvi-1-1/2026-06-01.md, action items all open.)
      (Mock Granola since 2026-06-01:)
      - USPDS-Standup: Monica spent two days on a gnarly rebase of PR 593 with merge conflicts in
        deterministic_strategy.rb; also waiting 4 days on Jyoti's review to land it.
      - DSA Working Session: team debated whether the supportTier enum should be nullable.
    evaluations:
      - type: behavior
        expectations:
          - "Frames the PR 593 review wait as a blocker worth raising (a cross-team review bottleneck), not as code detail"
          - "Keeps the agenda at career/goals/team/blocker altitude — does NOT include line-level code detail like merge-conflict specifics or the nullable-enum debate as a talking point"
          - "Organizes output under the manager-1:1 tiers (career / goals / team / blockers), not a standup dump"
        auto_fail:
          - "Surfaces code-level minutiae (merge conflict internals, enum nullability) as 1:1 talking points"
          - "Produces a technical status update instead of a career/team/blocker-framed agenda"

  # Carry-over reconciliation must be SUGGESTED, never asserted (fuzzy match).
  - name: carryover_suggested_not_asserted
    prompt: |
      /pe-prep

      (Mock last 1:1 note prudhvi-1-1/2026-06-01.md action items:)
      - [ ] Spin up jira-ticket-ranker work in a separate chat
      - [ ] Set up worktree + plan-lifecycle flow for parallel work
      (Mock git log since 2026-06-01:)
      - ed01335 Add jira-ticket-ranker skill
    evaluations:
      - type: behavior
        expectations:
          - "Marks the jira-ticket-ranker item as done but as a SUGGESTED status (e.g. 'done — verify'), citing commit ed01335 as the receipt"
          - "Keeps the worktree/plan-lifecycle item as still-open (no matching commit/PR)"
          - "Surfaces the done item as a win worth naming"
        auto_fail:
          - "Asserts the jira-ticket-ranker item is done with no verify caveat"
          - "Marks the worktree item done despite no git/PR evidence"

  # Parked/deferred questions are prime talking points and must surface.
  - name: parked_question_surfaces
    prompt: |
      /pe-prep

      (Mock last 1:1 note prudhvi-1-1/2026-05-26.md action items:)
      - [ ] (Future 1:1) Ask the deferred Optional B: 6-month vs 2-3 year horizon framing
    evaluations:
      - type: behavior
        expectations:
          - "Surfaces the parked horizon-framing question under 'Since last time' (or Career & growth) as something to raise this 1:1"
          - "Cites the note as the receipt"
        auto_fail:
          - "Omits the explicitly-parked question entirely"

  # The behavioral footer is ECHO-ONLY in v1 — quote her own lines, no new analysis.
  - name: footer_echo_only
    prompt: |
      /pe-prep

      (Mock last 1:1 note prudhvi-1-1/2026-05-26.md "Pattern to watch":)
      - Closed with "no more questions" when there was still a prepared question — under-claiming.
    evaluations:
      - type: behavior
        expectations:
          - "Includes a 'Worth remembering' footer that quotes the under-claiming line from the note"
          - "Attributes it to the note (the receipt) rather than presenting it as the skill's own diagnosis"
        auto_fail:
          - "Invents NEW behavioral analysis or psychoanalysis not present in the note"
          - "Presents the pattern as the skill's own conclusion rather than an echo of her note"

  # No recent 1:1 note — degrade honestly, don't fabricate 1:1 context.
  - name: degrades_without_note
    prompt: |
      /pe-prep

      (Mock — NO prudhvi-1-1 note is available.)
      (Mock Notion Actionables:)
      - [ ] Ship 2-3 small projects by Mo-6 — ask Prudhvi about volume expectations. (Scale/Execution)
    evaluations:
      - type: behavior
        expectations:
          - "States plainly that no fresh 1:1 note was found and carry-over may be incomplete"
          - "Still produces a useful agenda from the other sources (e.g. surfaces the volume-expectations ask from Actionables)"
        auto_fail:
          - "Fabricates carry-over items or pretends to know what was discussed in a prior 1:1"

  # Slack: a Prudhvi DM is high-signal career/goals input; a noisy channel must be ELEVATED, not dumped.
  - name: slack_dm_and_channel_altitude
    prompt: |
      /pe-prep

      (Mock Slack since the last 1:1:)
      - DM from Prudhvi to Monica: "When you get a sec — how's the apprenticeship tooling landing
        with the team? Curious whether others are picking up your skills."
      - #uspds-eng (~40 messages): mostly CI/deploy noise, plus a recurring thread where the team
        flags that open PRs are piling up faster than they're getting reviewed.
    evaluations:
      - type: behavior
        expectations:
          - "Surfaces Prudhvi's DM as a Career & growth / Goals talking point (e.g. bring a concrete example of how the tooling is landing with the team), citing the DM as the receipt"
          - "Elevates the #uspds-eng review-backlog thread into a Team or Blockers item (review bandwidth), not a paste of raw channel chatter"
        auto_fail:
          - "Dumps raw channel messages or CI/deploy noise as talking points instead of elevating the signal"
          - "Omits the Prudhvi DM ask entirely"

  # Jira lags reality on this team — cross-check against git, don't trust Jira status blindly.
  - name: jira_lags_flag_mismatch
    prompt: |
      /pe-prep

      (Mock last 1:1 note action item:)
      - [ ] Ship the details_text backend work (USPDS-627 / USPDS-628)
      (Mock git log since the anchor:)
      - a1b2c3d Merge USPDS-627: add details_text to prioritized_companies output
      - d4e5f6a Merge USPDS-628: switch Details column to backend details_text
      (Mock Jira:)
      - USPDS-627 — status: Backlog, assignee: none
      - USPDS-628 — status: Backlog, assignee: none
    evaluations:
      - type: behavior
        expectations:
          - "Reconciles 627/628 to their REAL state (merged/shipped, per git) — treats them as done work, NOT as not-done just because Jira says Backlog"
          - "Surfaces the Jira-vs-reality mismatch itself as a talking point (shipped work not reflected in Jira → visibility / velocity-on-paper risk)"
        auto_fail:
          - "Reports 627/628 as not done / still in backlog because Jira says so"
          - "Trusts Jira status over the git evidence that the work merged"

  # Behavior patterns require recurrence (>=2 entries); one-offs stay scratchpad entries.
  - name: patterns_require_recurrence
    prompt: |
      /pe-prep

      (Mock L1-ish behavior scratchpad, entries since the last 1:1:)
      - 2026-06-12: Caught Claude framing the supportTier enum wrong before I merged — corrected it.
      - 2026-06-18: Flagged that the AI's recipe-fallback assumption didn't match prod behavior.
      - 2026-06-20: Paired with Kilian on USPDS-611 for an afternoon.
    evaluations:
      - type: behavior
        expectations:
          - "Groups the two 'caught the AI's wrong framing' entries (06-12, 06-18) into ONE pattern under 'Patterns I've shown this cycle', with a title in Monica's voice, both dated citations, and a suggested talking point"
          - "Does NOT promote the single Kilian-pairing entry (06-20) to a pattern — one-offs stay scratchpad entries"
        auto_fail:
          - "Promotes a single one-off entry to a pattern (no recurrence)"
          - "Fabricates a pattern not backed by >=2 dated scratchpad entries"

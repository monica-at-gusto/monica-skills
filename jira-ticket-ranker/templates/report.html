<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jira Ticket Ranker</title>
<style>
  /* Colors + type mapped to @gusto/workbench-tokens v21.1.0 */
  :root {
    --type-family: "GCentra", -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", Helvetica, Arial, sans-serif;
    --bg: #fafafa;                 /* neutral surface-recessed */
    --card: #ffffff;               /* neutral surface */
    --ink: #1c1c1c;                /* neutral primary text */
    --muted: #6b6b6b;              /* neutral tertiary text */
    --line: #e5e5e5;               /* neutral-300 / divider */
    --ready: #007a4b;              /* success primary */
    --stretch: #b98900;            /* warning-600 */
    --held: #929292;               /* neutral accent border */
    --accent: #0a8080;             /* brand primary */
    --sync: #6e56cf;               /* intelligence primary */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.43 var(--type-family);   /* type-size-75 / lineHeightRatio-75 */
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 24px 90px; }

  header.top { margin-bottom: 8px; }
  .eyebrow { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  h1 { font-size: 24px; font-weight: 500; margin: 6px 0 10px; letter-spacing: -.01em; }   /* type-size-400, medium */
  .counts { display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; color: var(--muted); }
  .counts b { color: var(--ink); font-weight: 500; }
  .context { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; }
  .context .ctx { font-size: 12px; color: var(--muted); padding-left: 12px; border-left: 2px solid var(--line); line-height: 1.45; }
  .context .ctx b { color: var(--ink); font-weight: 500; }

  .banner {
    margin: 18px 0 4px; padding: 10px 13px; border-radius: 8px;
    background: #f0fcfb; border: 1px solid #cce8e7; color: #003737;   /* brand tints */
    font-size: 12px; line-height: 1.5;
  }
  .banner b { color: #182928; }
  .rule { height: 1px; background: var(--line); margin: 22px 0; }

  .tier { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 26px 0 10px; font-weight: 500; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    border-radius: 8px;
    padding: 16px 18px;
    margin: 10px 0;
  }
  .card.ready   { border-left-color: var(--ready); }
  .card.stretch { border-left-color: var(--stretch); }
  .card.held    { border-left-color: var(--held); background: #fafafa; }

  .card-head { display: flex; flex-direction: column; align-items: flex-start; gap: 7px; }
  .card h3 {
    font-size: 16px; font-weight: 500; margin: 0; max-width: 100%;   /* type-size-100, medium */
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card h3 a { color: inherit; text-decoration: none; }
  .card h3 a:hover { text-decoration: underline; }
  .badge {
    align-self: flex-start; font-size: 11px; letter-spacing: .06em; font-weight: 500;
    padding: 2px 9px; border-radius: 999px; white-space: nowrap;
  }
  .badge.ready   { color: #007a4b; background: #e0f6e5; }   /* success */
  .badge.stretch { color: #896500; background: #fff2df; }   /* warning */
  .badge.held    { color: #6b6b6b; background: #f3f3f3; }   /* neutral */

  .loc { font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); overflow-wrap: anywhere; margin-bottom: 8px; }
  .headline { margin: 8px 0 2px; color: #313131; }   /* neutral-1700 */

  .rats { margin: 12px 0 0; display: flex; flex-direction: column; gap: 9px; }
  .rat {
    font-size: 14px; color: #313131; line-height: 1.43;
    display: grid; grid-template-columns: 118px 1fr; gap: 0 16px; align-items: baseline;
  }
  .rat b { color: var(--ink); font-weight: 500; }
  .rat .lbl {
    color: var(--muted);
    font-size: 11px; letter-spacing: .04em; text-transform: uppercase; font-weight: 500;
    line-height: 1.7;
  }
  .rat .val { display: block; }
  @media (max-width: 540px) {
    .rat { grid-template-columns: 1fr; gap: 1px; }
  }

  .sync {
    margin: 12px 0 0; padding: 9px 12px; border-radius: 8px;
    background: #f9f5fe; border: 1px solid #e6dff9; color: #320a93;   /* intelligence tints */
    font-size: 13px; line-height: 1.5;
  }
  .sync .who { font-weight: 500; color: var(--sync); }
  .sync .lbl { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: #6e56cf; font-weight: 500; margin-right: 6px; }

  .note { margin: 10px 0 0; padding: 9px 12px; border-radius: 8px; background: #fff2df; border: 1px solid #ffdea1; color: #6b4e00; font-size: 12px; line-height: 1.5; }   /* warning tints */
  .note b { color: #402d00; }

  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .pill {
    font-size: 11px; color: var(--muted);
    background: #f3f3f3; border: 1px solid var(--line);
    padding: 1px 8px; border-radius: 999px;
  }
  .pill.prio   { color: #c53336; background: #ffedeb; border-color: #ffdad7; }   /* error */
  .pill.prio.med { color: #896500; background: #fff2df; border-color: #ffdea1; } /* warning */
  .pill.free   { color: #007a4b; background: #e0f6e5; border-color: #bceece; }   /* success */
  .pill.stack  { color: #0a8080; background: #e5f4f3; border-color: #cce8e7; }   /* brand */
  .pill.epic   { color: #6e56cf; background: #f4eefd; border-color: #e6dff9; }   /* intelligence */

  .held .headline { color: var(--muted); }
  footer.foot { margin-top: 30px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">jira ticket ranker</div>
    <h1 id="title">—</h1>
    <div class="counts" id="counts"></div>
    <div class="context" id="context"></div>
    <div class="banner" id="banner"></div>
  </header>
  <div class="rule"></div>
  <main id="tickets"></main>
  <footer class="foot" id="foot"></footer>
</div>

<script>
// The skill replaces the whole block between the START/END markers (inclusive)
// with: const RANK = <JSON literal>;  (see SKILL.md Step 5 for the shape).
// meta supports: title, generated, jiraBase, counts {ready,stretch,held},
//   backlog (string — total open scanned, e.g. "127"), config, context[], banner.
// tickets[]: key, tier (ready|stretch|held), badge, summary, headline,
//   rationale[] {lbl,val}, sync {who,why}, optional note, pills[].
/* __RANK_DATA_START__ */
const RANK = {
  meta: {
    title: "Sample — no data injected",
    generated: "—",
    jiraBase: "https://gustohq.atlassian.net/browse/",
    counts: { ready: 0, stretch: 0, held: 0 },
    backlog: "",
    config: "",
    context: [],
    banner: "A <b>shortlist, not a claim</b> — sync with the owner before you pick anything up."
  },
  tickets: []
};
/* __RANK_DATA_END__ */

const TIERS = [
  ["ready", "Ready"],
  ["stretch", "Manageable stretch"],
  ["held", "Considered — not recommended (yet)"],
];

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
}

function render() {
  const m = RANK.meta;
  document.title = "Jira Ticket Ranker — " + m.generated;
  document.getElementById("title").textContent = m.title;

  const c = m.counts || {};
  const backlogSpan = m.backlog ? `<span><b>${m.backlog}</b> tickets scanned</span>` : "";
  document.getElementById("counts").innerHTML =
    `<span><b>${c.ready||0}</b> ready</span>` +
    `<span><b>${c.stretch||0}</b> stretch</span>` +
    `<span><b>${c.held||0}</b> considered</span>` +
    backlogSpan +
    `<span>generated <b>${m.generated}</b></span>`;

  const ctx = (m.config ? [m.config] : []).concat(m.context || []);
  document.getElementById("context").innerHTML = ctx.map(s => {
    const i = s.indexOf(": ");
    return (i > 0 && i <= 20)
      ? `<span class="ctx"><b>${escapeHtml(s.slice(0, i))}</b> ${s.slice(i + 2)}</span>`
      : `<span class="ctx">${s}</span>`;
  }).join("");

  document.getElementById("banner").innerHTML = m.banner || "";

  const root = document.getElementById("tickets");
  for (const [key, label] of TIERS) {
    const items = RANK.tickets.filter(t => t.tier === key);
    if (!items.length) continue;
    root.appendChild(el("div", "tier", label));
    for (const t of items) root.appendChild(card(t));
  }

  document.getElementById("foot").innerHTML =
    "Confidence labels, not scores — permission to act, not a verdict.";
}

function card(t) {
  const card = el("div", "card " + t.tier);

  const head = el("div", "card-head");
  if (t.badge) head.appendChild(el("span", "badge " + t.tier, t.badge));
  const h3 = el("h3");
  const fullTitle = (t.key ? t.key + " — " : "") + t.summary;
  h3.title = fullTitle;
  if (t.key) {
    const a = el("a", null, fullTitle);
    a.href = (RANK.meta.jiraBase || "") + t.key;
    a.target = "_blank"; a.rel = "noopener";
    h3.appendChild(a);
  } else {
    h3.textContent = t.summary;
  }
  head.appendChild(h3);
  card.appendChild(head);

  if (t.loc) card.appendChild(el("div", "loc", t.loc));
  if (t.headline) card.appendChild(el("p", "headline", t.headline));

  if (t.rationale && t.rationale.length) {
    const rats = el("div", "rats");
    for (const r of t.rationale) {
      const row = el("div", "rat");
      row.innerHTML = `<span class="lbl">${escapeHtml(r.lbl)}</span><span class="val">${r.val}</span>`;
      rats.appendChild(row);
    }
    card.appendChild(rats);
  }

  if (t.sync) {
    const s = el("div", "sync");
    s.innerHTML = `<span class="lbl">🔗 Sync first</span><span class="who">${escapeHtml(t.sync.who)}</span> — ${t.sync.why}`;
    card.appendChild(s);
  }

  if (t.note) {
    const n = el("div", "note");
    n.innerHTML = t.note;
    card.appendChild(n);
  }

  if (t.pills && t.pills.length) {
    const pills = el("div", "pills");
    t.pills.forEach(p => {
      let cls = "pill";
      if (/Highest|High/.test(p) && /P0|P1|Highest/.test(p)) cls += " prio";
      else if (/^Medium|^High/.test(p)) cls += " prio med";
      if (/Unassigned/.test(p)) cls = "pill free";
      if (/backend|frontend|Salesforce|pack|stack/i.test(p)) cls = "pill stack";
      if (/epic|parent/i.test(p)) cls = "pill epic";
      pills.appendChild(el("span", cls, p));
    });
    card.appendChild(pills);
  }

  return card;
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PR Review Coach</title>
<style>
  :root {
    --bg: #f7f7f6;
    --card: #ffffff;
    --ink: #1c1c1e;
    --muted: #6b7177;
    --line: #e7e7e4;
    --critical: #e5484d;
    --important: #e08a00;
    --suggestion: #7a828a;
    --strength: #2f9e44;
    --accent: #1c1c1e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 15px/1.55 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 24px 120px; }

  header.top { margin-bottom: 8px; }
  .eyebrow { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  h1 { font-size: 22px; font-weight: 650; margin: 6px 0 10px; letter-spacing: -.01em; }
  .counts { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .counts b { color: var(--ink); font-weight: 600; }
  .context { display: flex; flex-direction: column; gap: 3px; margin-top: 12px; }
  .context .ctx { font-size: 12.5px; color: var(--muted); padding-left: 12px; border-left: 2px solid var(--line); line-height: 1.45; }
  .context .ctx b { color: var(--ink); font-weight: 600; }
  .rule { height: 1px; background: var(--line); margin: 22px 0; }

  .tier { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 26px 0 10px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    margin: 10px 0;
  }
  .card.critical   { border-left-color: var(--critical); }
  .card.important  { border-left-color: var(--important); }
  .card.suggestion { border-left-color: var(--suggestion); }
  .card.strength   { border-left-color: var(--strength); }

  .card-head { display: flex; align-items: flex-start; gap: 12px; }
  .card h3 { font-size: 15px; font-weight: 600; margin: 0 0 6px; flex: 1; }
  .verdict {
    flex: none; font-size: 11px; letter-spacing: .08em; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; white-space: nowrap;
  }
  .verdict.right   { color: #1b7a33; background: #e7f4ea; }
  .verdict.missed  { color: #b42318; background: #fbeae8; }
  .verdict.sharpen { color: #9a6700; background: #fbf1dd; }
  .verdict.deferred { color: #6b7177; background: #efefee; }
  .yourread { margin: 8px 0 0; padding-left: 10px; border-left: 2px solid var(--line); color: var(--muted); }
  .yourread b { color: var(--ink); font-weight: 600; }
  .card.deferred { border-left-color: var(--line); background: #fbfbfa; }
  .deferral { margin: 8px 0 0; color: #34383d; }
  .deferral b { color: var(--ink); font-weight: 600; }
  .loc { font: 12.5px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); }
  .detail { margin: 8px 0 0; color: #34383d; }
  .fix { margin: 8px 0 0; color: #34383d; }
  .fix span { color: var(--muted); }

  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .pill {
    font-size: 11.5px; color: var(--muted);
    background: #f1f1ef; border: 1px solid var(--line);
    padding: 1px 8px; border-radius: 999px;
  }
  /* source (lens) colors */
  .pill.lens-risk        { color: #5b3fd6; background: #efebfd; border-color: #e0d8fb; }
  .pill.lens-fresh-eyes  { color: #0e7490; background: #e6f6f9; border-color: #cdeef3; }
  .pill.incident         { color: #9a3412; background: #fdeee3; border-color: #f6dcc6; }
  /* confidence colors */
  .pill.conf-high        { color: #1b7a33; background: #e7f4ea; border-color: #d6ecdc; }
  .pill.conf-medium      { color: #9a6700; background: #fbf1dd; border-color: #f3e6c4; }
  .pill.conf-low         { color: #b42318; background: #fbeae8; border-color: #f3d6d2; }

  .controls { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg button {
    border: 0; background: #fff; color: var(--muted);
    font: inherit; font-size: 13px; padding: 5px 14px; cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--line); }
  .seg button.on { background: var(--accent); color: #fff; }
  .controls .hint { font-size: 12px; color: var(--muted); }

  textarea {
    width: 100%; margin-top: 10px; resize: vertical; min-height: 56px;
    font: 13.5px/1.5 ui-sans-serif, -apple-system, sans-serif;
    color: var(--ink); background: #fcfcfb;
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px;
  }
  .card.skipped { opacity: .55; }
  .card.skipped textarea { display: none; }

  .bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
    padding: 12px 24px; display: flex; justify-content: center;
  }
  .bar-inner { width: 100%; max-width: 760px; display: flex; align-items: center; gap: 14px; }
  .copybtn {
    border: 0; background: var(--accent); color: #fff;
    font: inherit; font-weight: 600; font-size: 14px;
    padding: 9px 18px; border-radius: 10px; cursor: pointer;
  }
  .copybtn:active { transform: translateY(1px); }
  .copybtn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .status { font-size: 13px; color: var(--muted); margin-left: auto; }
  .blob {
    width: 100%; max-width: 760px; margin: 12px auto 0;
    font: 11.5px ui-monospace, Menlo, monospace; color: #34383d;
    border: 1px dashed var(--line); border-radius: 8px; padding: 8px; min-height: 40px;
    display: none; background: #fff;
  }
  footer.note { margin-top: 28px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">pr review coach</div>
    <h1 id="title">—</h1>
    <div class="counts" id="counts"></div>
    <div class="context" id="context"></div>
  </header>
  <div class="rule"></div>
  <main id="findings"></main>
  <textarea class="blob" id="blob" readonly></textarea>
  <footer class="note">Toggle Post/Skip, tweak the wording, then copy your decisions back to Claude.</footer>
</div>

<div class="bar">
  <div class="bar-inner">
    <button class="copybtn" id="copy">Copy decisions for Claude</button>
    <button class="copybtn secondary" id="copyPr">Copy for PR</button>
    <button class="copybtn secondary" id="copyNotes">Copy for notes</button>
    <span class="status" id="status"></span>
  </div>
</div>

<script>
// The skill replaces the whole block between the START/END markers (inclusive)
// with: const PRC = <JSON literal>;
/* __PRC_DATA_START__ */
const PRC = {
  meta: { target: "sample", title: "Sample review — no data injected", mode: "remote",
          counts: { critical: 0, important: 0, suggestion: 0, strength: 0 } },
  findings: []
};
/* __PRC_DATA_END__ */

const TIERS = [
  ["critical", "Critical"],
  ["important", "Important"],
  ["suggestion", "Suggestion"],
  ["strength", "Strengths"],
];
const decisions = {}; // id -> {action, body}

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}

function render() {
  const tag = PRC.meta.ticket || PRC.meta.target;
  document.title = "PR Review Coach" + (tag ? ": " + tag : "");
  document.getElementById("title").textContent = PRC.meta.title || PRC.meta.target;
  const c = PRC.meta.counts || {};
  document.getElementById("counts").innerHTML =
    `<span><b>${c.critical||0}</b> critical</span>` +
    `<span><b>${c.important||0}</b> important</span>` +
    `<span><b>${c.suggestion||0}</b> suggestion</span>` +
    `<span><b>${c.strength||0}</b> strengths</span>`;

  const ctx = PRC.meta.context || [];
  if (ctx.length) {
    document.getElementById("context").innerHTML = ctx.map(s => {
      const i = s.indexOf(": ");
      return (i > 0 && i <= 18)
        ? `<span class="ctx"><b>${escapeHtml(s.slice(0, i))}</b> ${escapeHtml(s.slice(i + 2))}</span>`
        : `<span class="ctx">${escapeHtml(s)}</span>`;
    }).join("");
  }

  const root = document.getElementById("findings");
  for (const [key, label] of TIERS) {
    const items = PRC.findings.filter(f => f.severity === key && f.status !== "acknowledged-deferred");
    if (!items.length) continue;
    root.appendChild(el("div", "tier", label));
    for (const f of items) root.appendChild(card(f, key));
  }
  const deferred = PRC.findings.filter(f => f.status === "acknowledged-deferred");
  if (deferred.length) {
    root.appendChild(el("div", "tier", "Acknowledged & deferred"));
    for (const f of deferred) root.appendChild(deferredCard(f));
  }
}

const VERDICTS = { right: "RIGHT", missed: "MISSED", sharpen: "SHARPEN" };

function deferredCard(f) {
  const card = el("div", "card deferred");
  const head = el("div", "card-head");
  head.appendChild(el("h3", null, f.title));
  head.appendChild(el("span", "verdict deferred", "DEFERRED"));
  card.appendChild(head);
  if (f.file) card.appendChild(el("div", "loc", f.file + (f.line ? ":" + f.line : "")));
  const d = f.deferral || {};
  if (d.rationale) { const p = el("p", "deferral"); p.innerHTML = `<b>Why deferred</b> — ` + escapeHtml(d.rationale); card.appendChild(p); }
  if (d.follow_up) { const p = el("p", "deferral"); p.innerHTML = `<b>Follow-up</b> — ` + escapeHtml(d.follow_up); card.appendChild(p); }
  if (d.decided_at) card.appendChild(el("div", "loc", "deferred " + d.decided_at));
  return card;
}

function card(f, key) {
  const card = el("div", "card " + key);

  const head = el("div", "card-head");
  head.appendChild(el("h3", null, f.title));
  if (f.verdict && VERDICTS[f.verdict]) {
    head.appendChild(el("span", "verdict " + f.verdict, VERDICTS[f.verdict]));
  }
  card.appendChild(head);

  if (f.file) {
    const loc = el("div", "loc", f.file + (f.line ? ":" + f.line : ""));
    card.appendChild(loc);
  }
  if (f.your_read) {
    const yr = el("p", "yourread");
    yr.innerHTML = `<b>Your read</b> — ` + escapeHtml(f.your_read);
    card.appendChild(yr);
  }
  if (f.detail) card.appendChild(el("p", "detail", f.detail));
  if (f.suggested_action) {
    const fix = el("p", "fix");
    fix.innerHTML = `<span>fix →</span> ` + escapeHtml(f.suggested_action);
    card.appendChild(fix);
  }
  const pills = el("div", "pills");
  if (f.lens) pills.appendChild(el("span", "pill lens-" + slug(f.lens), f.lens));
  if (f.check) pills.appendChild(el("span", "pill", f.check));
  if (f.confidence) pills.appendChild(el("span", "pill conf-" + f.confidence, f.confidence + " confidence"));
  (f.incident_refs || []).forEach(r => pills.appendChild(el("span", "pill incident", "incident " + r)));
  card.appendChild(pills);

  const initial = f.default_action || (key === "critical" || key === "important" ? "post" : "skip");
  decisions[f.id] = { action: initial, body: f.draft_body || "", file: f.file, line: f.line, side: f.side || "RIGHT" };

  const controls = el("div", "controls");
  const seg = el("div", "seg");
  const postBtn = el("button", null, "Post");
  const skipBtn = el("button", null, "Skip");
  seg.append(postBtn, skipBtn);
  controls.appendChild(seg);
  card.appendChild(controls);

  const ta = el("textarea");
  ta.value = f.draft_body || "";
  ta.placeholder = "Comment to post…";
  ta.addEventListener("input", () => { decisions[f.id].body = ta.value; });
  card.appendChild(ta);

  function setAction(a) {
    decisions[f.id].action = a;
    postBtn.classList.toggle("on", a === "post");
    skipBtn.classList.toggle("on", a === "skip");
    card.classList.toggle("skipped", a === "skip");
  }
  postBtn.addEventListener("click", () => setAction("post"));
  skipBtn.addEventListener("click", () => setAction("skip"));
  setAction(initial);

  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
}
function slug(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-"); }

function buildBlob() {
  const out = {
    _type: "pr-review-coach-decisions",
    target: PRC.meta.target,
    mode: PRC.meta.mode,
    decisions: Object.entries(decisions).map(([id, d]) => ({
      id: Number(id), action: d.action,
      file: d.file, line: d.line, side: d.side,
      body: d.action === "post" ? d.body : undefined,
    })),
  };
  return JSON.stringify(out, null, 2);
}

function buildPrMarkdown() {
  const labels = { critical: "Critical", important: "Important", suggestion: "Suggestion" };
  const lines = ["## PR Review", ""];
  for (const key of ["critical", "important", "suggestion"]) {
    const items = PRC.findings.filter(f => f.severity === key && decisions[f.id] && decisions[f.id].action === "post");
    if (!items.length) continue;
    lines.push(`**${labels[key]}**`);
    for (const f of items) {
      const loc = f.file ? "`" + f.file + (f.line ? ":" + f.line : "") + "` — " : "";
      lines.push(`- ${loc}${(decisions[f.id].body || f.title).trim()}`);
    }
    lines.push("");
  }
  const strengths = PRC.findings.filter(f => f.severity === "strength" && decisions[f.id] && decisions[f.id].action === "post");
  if (strengths.length) {
    lines.push("**Strengths**");
    strengths.forEach(f => lines.push(`- ${(decisions[f.id].body || f.title).trim()}`));
    lines.push("");
  }
  const deferred = PRC.findings.filter(f => f.status === "acknowledged-deferred");
  if (deferred.length) {
    lines.push("**Deferred (acknowledged)**");
    deferred.forEach(f => {
      const loc = f.file ? "`" + f.file + (f.line ? ":" + f.line : "") + "` — " : "";
      const d = f.deferral || {};
      let l = `- ${loc}${f.title}: ${(d.rationale || "").trim()}`;
      if (d.follow_up) l += ` Follow-up: ${d.follow_up.trim()}`;
      lines.push(l);
    });
    lines.push("");
  }
  return lines.join("\n").trim() + "\n";
}

function buildNotesMarkdown() {
  const m = PRC.meta;
  const heading = (m.ticket ? m.ticket + " — " : "") + (m.title || m.target || "");
  const lines = ["# PR Review — " + heading, ""];
  (m.context || []).forEach(s => lines.push("- " + s));
  if ((m.context || []).length) lines.push("");
  const labels = { critical: "Critical", important: "Important", suggestion: "Suggestion", strength: "Strengths" };
  for (const key of ["critical", "important", "suggestion", "strength"]) {
    const items = PRC.findings.filter(f => f.severity === key && f.status !== "acknowledged-deferred");
    if (!items.length) continue;
    lines.push("## " + labels[key]);
    items.forEach(f => {
      const loc = f.file ? "`" + f.file + (f.line ? ":" + f.line : "") + "` — " : "";
      lines.push(`- ${loc}${f.title}`);
      if (f.detail) lines.push(`  ${f.detail}`);
      if (f.suggested_action) lines.push(`  fix → ${f.suggested_action}`);
      const tags = [f.lens, f.check, f.confidence && f.confidence + " confidence"].filter(Boolean)
        .concat((f.incident_refs || []).map(r => "incident " + r));
      const dec = decisions[f.id] ? ` [${decisions[f.id].action}]` : "";
      if (tags.length || dec) lines.push(`  (${tags.join(" · ")})${dec}`);
    });
    lines.push("");
  }
  const deferred = PRC.findings.filter(f => f.status === "acknowledged-deferred");
  if (deferred.length) {
    lines.push("## Deferred (acknowledged)");
    deferred.forEach(f => {
      const loc = f.file ? "`" + f.file + (f.line ? ":" + f.line : "") + "` — " : "";
      const d = f.deferral || {};
      lines.push(`- ${loc}${f.title}: ${(d.rationale || "").trim()}`);
      if (d.follow_up) lines.push(`  Follow-up: ${d.follow_up.trim()}`);
    });
    lines.push("");
  }
  return lines.join("\n").trim() + "\n";
}

async function copyOut(text, okMsg, fallbackMsg) {
  const status = document.getElementById("status");
  const ta = document.getElementById("blob");
  ta.value = text; ta.style.display = "block";
  let copied = false;
  try { await navigator.clipboard.writeText(text); copied = true; } catch (e) {}
  if (!copied) { try { ta.select(); document.execCommand("copy"); copied = true; } catch (e) {} }
  status.textContent = copied ? okMsg : fallbackMsg;
}

document.getElementById("copy").addEventListener("click", () => {
  const n = Object.values(decisions).filter(d => d.action === "post").length;
  copyOut(buildBlob(), `Copied — ${n} to post. Paste into Claude.`,
          `Select the box below and copy — ${n} to post.`);
});

document.getElementById("copyPr").addEventListener("click", () => {
  copyOut(buildPrMarkdown(), "Copied PR markdown — paste it into the PR.",
          "Select the box below and copy the PR markdown.");
});

document.getElementById("copyNotes").addEventListener("click", () => {
  copyOut(buildNotesMarkdown(), "Copied notes record — paste into your ticket chat or notes.",
          "Select the box below and copy the notes record.");
});

render();
</script>
</body>
</html>
